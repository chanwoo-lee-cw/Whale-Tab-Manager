<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>탭 관리자</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>탭 관리자</h1>

  <div class="actions">
    <button id="btn-save-current">현재 탭 저장</button>
    <hr>
    <button id="btn-save-all-keep">모든 탭 저장 후 유지</button>
    <button id="btn-save-all-close">모든 탭 저장 후 닫기</button>
  </div>

  <p id="status" class="status"></p>

  <div class="btn-group-bottom">
    <button id="btn-open-landing" class="btn-landing">탭 관리 페이지 →</button>
    <button id="btn-open-sidebar" class="btn-sidebar">사이드바에서 열기</button>

  <script src="src/tab-save.js"></script>
  <script src="src/popup.js"></script>
