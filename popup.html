<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Tab Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header>
    <div class="brand">
      <svg class="brand-mark" width="20" height="20" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="13,2 24,8 24,18 13,24 2,18 2,8" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <polygon points="13,7 19,10.5 19,15.5 13,19 7,15.5 7,10.5" fill="currentColor" opacity="0.3"/>
      </svg>
      <div class="brand-text">
        <span class="brand-title">Tab Archive</span>
        <span class="brand-sub">Whale Tab Manager</span>
      </div>
    </div>
  </header>

  <div class="actions">
    <button id="btn-save-current" class="btn-action">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      현재 탭 저장
    </button>

    <div class="divider"></div>

    <button id="btn-save-all-keep" class="btn-action">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      모든 탭 저장 후 유지
    </button>

    <button id="btn-save-all-close" class="btn-action btn-danger">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <path d="M9 9l6 6M15 9l-6 6"/>
      </svg>
      모든 탭 저장 후 닫기
    </button>
  </div>

  <p id="status" class="status"></p>

  <div id="saved-groups">
    <p id="groups-empty-state" class="empty-state">저장된 탭이 없습니다.</p>
  </div>

  <button id="btn-open-landing" class="btn-landing">
    Tab Archive 열기
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>

  <script src="src/tab-group.js"></script>
  <script src="src/tab-save.js"></script>
  <script src="src/popup.js"></script>
</body>
</html>
