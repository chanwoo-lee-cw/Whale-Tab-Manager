<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>탭 관리자</title>
  <link rel="stylesheet" href="landing.css">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <header>
    <h1>탭 관리자</h1>
    <input id="search-input" type="search" placeholder="검색…" autocomplete="off">
  </header>

  <main>
    <!-- merge-bar 없음: 사이드바에서 병합은 미지원 -->
    <div id="empty-state" class="hidden">
      <p>저장된 탭이 없습니다.</p>
      <p class="empty-sub">팝업에서 탭을 저장하면 여기에 표시됩니다.</p>
    </div>
    <ul id="group-list" class="hidden"></ul>
  </main>

  <script src="src/tab-group.js"></script>
  <script src="src/landing.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await refreshGroupList();
      bindStorageListener();
      bindSearchInput();
    });
  </script>
</body>
</html>
